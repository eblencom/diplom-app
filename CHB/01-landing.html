<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CHB 01 — Лендинг / вход</title>
    <link rel="stylesheet" href="prototype.css" />
  </head>
  <body>
    <p class="page-title">Прототип: / (гость — лендинг, вход, регистрация)</p>
    <div class="nav-back"><a href="index.html">← Оглавление</a></div>
    <div class="frame">
      <div class="block block-muted">
        <div class="label">Декоративный фон (в макете условно)</div>
        <div class="rect rect-lg" style="opacity: 0.3"></div>
      </div>

      <div class="block" style="margin-top: 12px">
        <div class="label">Герой-блок (заголовок, УТП)</div>
        <div class="rect" style="width: 70%"></div>
        <div class="rect rect-sm" style="width: 90%"></div>
        <div class="rect rect-sm" style="width: 45%"></div>
      </div>

      <div class="block" id="auth" style="margin-top: 12px">
        <div class="label">Формы входа и регистрации</div>
        <div class="grid-2">
          <div class="block">
            <div class="label">Вход</div>
            <div class="rect rect-sm"></div>
            <div class="rect rect-sm"></div>
            <div class="rect" style="width: 40%; margin-top: 8px"></div>
          </div>
          <div class="block">
            <div class="label">Регистрация</div>
            <div class="rect rect-sm"></div>
            <div class="rect rect-sm"></div>
            <div class="rect rect-sm"></div>
            <div class="rect" style="width: 50%; margin-top: 8px"></div>
          </div>
        </div>
      </div>

      <div class="block" style="margin-top: 12px">
        <div class="label">Возможности сервиса (чипы)</div>
        <div class="row">
          <span class="pill">…</span>
          <span class="pill">…</span>
          <span class="pill">…</span>
          <span class="pill">…</span>
        </div>
      </div>

      <div class="block" style="margin-top: 12px">
        <div class="label">Эмитенты — сетка карточек</div>
        <div class="grid-4">
          <div class="block" style="min-height: 48px; margin: 0"></div>
          <div class="block" style="min-height: 48px; margin: 0"></div>
          <div class="block" style="min-height: 48px; margin: 0"></div>
          <div class="block" style="min-height: 48px; margin: 0"></div>
        </div>
      </div>

      <div class="block" style="margin-top: 12px">
        <div class="label">Превью новостей для гостя</div>
        <div class="article-card" style="margin-bottom: 6px">
          <div class="rect rect-sm" style="width: 30%"></div>
          <div class="rect"></div>
          <div class="rect rect-sm" style="width: 80%"></div>
        </div>
        <div class="article-card" style="margin-bottom: 0">
          <div class="rect rect-sm" style="width: 35%"></div>
          <div class="rect"></div>
        </div>
      </div>

      <div class="block block-muted" style="margin-top: 12px; text-align: center">
        <div class="label">Призыв к регистрации</div>
        <div class="rect" style="width: 200px; margin: 8px auto"></div>
      </div>
    </div>
  </body>
</html>
